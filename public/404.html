<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HRSuite</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      var l = window.location;
      l.replace(
        l.protocol + "//" +
        l.hostname + (l.port ? ":" + l.port : "") +
        "/HRSuite_application-gestion/?" +
        l.pathname.slice(1).replace(/\//g, "~1") +
        (l.search ? "&" + l.search.slice(1) : "") +
        l.hash
      );
    </script>
  </head>
  <body />
</html>
